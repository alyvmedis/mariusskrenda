name: Skrydziu Robotas

on:
  schedule:
    # Paleisti kasdien 07:00 ir 19:00 valandą UTC laiku
    - cron: '0 7,19 * * *'
  workflow_dispatch: # Leidžia paleisti robotą rankiniu būdu bet kada

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Atsisiunciame koda
        uses: actions/checkout@v4

      - name: Sukonfiguruojame Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Idiegiame reikalingus irankius
        run: |
          pip install -r requirements.txt

      - name: Paleidžiame skrydziu paieska
        run: python skrydziai.py
